
<h2 class="sr-only">F.R.I.D.A.Y. interactive capability briefing — click each module to learn what your assistant will do</h2>

<style>
  .fri-wrap { padding: 1.5rem 0; font-family: var(--font-sans); }
  .fri-header { text-align: center; margin-bottom: 2rem; }
  .fri-title { font-size: 32px; font-weight: 500; color: var(--color-text-primary); letter-spacing: 3px; margin: 0 0 4px; }
  .fri-sub { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 1.5rem; }
  .fri-status { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--color-text-success); background: var(--color-background-success); border: 0.5px solid var(--color-border-success); border-radius: 20px; padding: 4px 14px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-text-success); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .modules { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .mod-btn { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem; cursor: pointer; text-align: left; transition: border-color 0.15s; }
  .mod-btn:hover { border-color: var(--color-border-secondary); background: var(--color-background-secondary); }
  .mod-btn.active { border: 1.5px solid var(--color-border-info); background: var(--color-background-primary); }
  .mod-icon { font-size: 22px; margin-bottom: 8px; display: block; }
  .mod-name { font-size: 13px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 3px; }
  .mod-hint { font-size: 11px; color: var(--color-text-secondary); margin: 0; }

  .panel { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem 1.5rem; min-height: 260px; }
  .panel-title { font-size: 17px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
  .panel-desc { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 1.25rem; line-height: 1.6; }
  .cmd-list { list-style: none; padding: 0; margin: 0 0 1.25rem; display: flex; flex-direction: column; gap: 8px; }
  .cmd-item { display: flex; align-items: flex-start; gap: 10px; }
  .cmd-voice { font-size: 12px; font-style: italic; color: var(--color-text-info); background: var(--color-background-info); border-radius: var(--border-radius-md); padding: 5px 10px; min-width: 0; flex: 1; line-height: 1.5; }
  .cmd-action { font-size: 12px; color: var(--color-text-secondary); flex: 1.2; padding: 5px 0; line-height: 1.5; }
  .ask-btn { font-size: 12px; cursor: pointer; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-secondary); padding: 6px 12px; }
  .ask-btn:hover { background: var(--color-background-secondary); }
</style>

<div class="fri-wrap">
  <div class="fri-header">
    <p class="fri-title">F.R.I.D.A.Y.</p>
    <p class="fri-sub">Your personal AI — always on, always thinking</p>
    <span class="fri-status"><span class="dot"></span>All systems online</span>
  </div>

  <div class="modules" id="modules"></div>
  <div class="panel" id="panel"></div>
</div>

<script>
const modules = [
  {
    icon: "🌐",
    name: "World knowledge",
    hint: "Live news & info",
    title: "It knows what's happening right now",
    desc: "Ask about anything — news, weather, sports, stocks, world events. Friday fetches live data and explains it to you in plain language, not search results.",
    cmds: [
      ["Hey Friday, what happened in the world today?", "Fetches top headlines and summarises them for you"],
      ["Will it rain in Faridabad tomorrow?", "Pulls live forecast, tells you what to wear"],
      ["How is India doing in the match?", "Gets live cricket score and commentary"],
      ["What is the Sensex at right now?", "Fetches live market data instantly"],
    ],
    ask: "How does Friday fetch live news?"
  },
  {
    icon: "💻",
    name: "PC control",
    hint: "No keyboard needed",
    title: "It controls your entire computer",
    desc: "No keyboard. No mouse. Just your voice. Open apps, manage files, write and execute code, search your system — anything you'd normally do by hand.",
    cmds: [
      ["Open VS Code and create scraper.py", "Creates the file and opens it in your editor"],
      ["Write a Python loop that prints 1 to 10", "Writes, saves and runs the code for you"],
      ["Find all PDFs on my desktop", "Scans your file system and lists them"],
      ["Take a screenshot and save it", "Captures screen and stores it instantly"],
    ],
    ask: "What Python libraries power PC control?"
  },
  {
    icon: "🛒",
    name: "Auto shopping",
    hint: "Order without typing",
    title: "It shops for you — fully automated",
    desc: "Friday opens Amazon or Flipkart, searches, picks the right product, selects size/colour, and places the order. All from one voice command. No typing at all.",
    cmds: [
      ["Order a black t-shirt size L under 500 rupees", "Opens Amazon, searches, filters, and orders it"],
      ["Reorder my last Swiggy order", "Opens Swiggy and repeats your previous order"],
      ["Find the cheapest USB-C cable on Flipkart", "Searches, compares and shows you options"],
      ["Add protein powder to my Amazon cart", "Finds it and adds to cart without you touching anything"],
    ],
    ask: "How does browser automation work for shopping?"
  },
  {
    icon: "🖥️",
    name: "Screen manager",
    hint: "Opens what you need",
    title: "It manages your screens intelligently",
    desc: "When you ask about something, Friday doesn't just speak — it opens the right window, tab, or app so you can see it. It decides what to show you.",
    cmds: [
      ["Show me the weather forecast", "Opens a live weather widget for your city"],
      ["Pull up my last Python project", "Finds and opens the file in your editor"],
      ["Show me a chart of Bitcoin price", "Opens a live price chart in the browser"],
      ["Display today's top news", "Opens news layout you can read along with"],
    ],
    ask: "How does Friday decide what to open on screen?"
  },
  {
    icon: "🏠",
    name: "Smart home",
    hint: "Controls your space",
    title: "It controls your entire home",
    desc: "Wired into your physical space through a Raspberry Pi. One sentence and your room responds — lights, AC, TV, curtains, fans, everything.",
    cmds: [
      ["Turn on the TV", "Sends IR signal via RPi, TV powers on"],
      ["Set AC to 22 degrees", "Commands AC via IR blaster or smart relay"],
      ["Good night", "Dims lights, sets AC to sleep mode, locks your PC"],
      ["Good morning", "Opens curtains, turns on light, reads out your day"],
    ],
    ask: "How do I set up Raspberry Pi for smart home?"
  },
  {
    icon: "🧠",
    name: "Thinks & reasons",
    hint: "Your thinking partner",
    title: "It thinks, reasons and helps you solve problems",
    desc: "Powered by a top-tier LLM. Debug code, write emails, explain complex topics, plan your week, translate anything — it's a full thinking partner.",
    cmds: [
      ["Debug this error in my code", "Reads your file, finds the bug, explains and fixes it"],
      ["Write a cold email to a startup", "Drafts a professional email ready to send"],
      ["Explain how quantum computing works", "Breaks it down in plain English, your level"],
      ["Summarise this PDF for me", "Reads it and gives you the key points"],
    ],
    ask: "What LLM powers Friday's reasoning?"
  },
  {
    icon: "🗃️",
    name: "Memory",
    hint: "Knows your habits",
    title: "It remembers you and learns your habits",
    desc: "Friday keeps a memory of your preferences, routines, past conversations and reminders — so every interaction feels personal and gets smarter over time.",
    cmds: [
      ["Remind me to call dad at 7pm", "Sets reminder, gives you a voice alert at 7pm"],
      ["I always wake up at 7, remember that", "Stores your routine, triggers morning mode at 7am"],
      ["What did we talk about yesterday?", "Reads from logs and summarises the conversation"],
      ["What are my pending reminders?", "Lists all active reminders and tasks"],
    ],
    ask: "How does Friday store and use memory?"
  },
];

let active = 0;

function render() {
  const mc = document.getElementById('modules');
  mc.innerHTML = modules.map((m,i) => `
    <button class="mod-btn${i===active?' active':''}" onclick="setActive(${i})">
      <span class="mod-icon">${m.icon}</span>
      <p class="mod-name">${m.name}</p>
      <p class="mod-hint">${m.hint}</p>
    </button>
  `).join('');

  const m = modules[active];
  document.getElementById('panel').innerHTML = `
    <p class="panel-title">${m.title}</p>
    <p class="panel-desc">${m.desc}</p>
    <ul class="cmd-list">
      ${m.cmds.map(([v,a]) => `
        <li class="cmd-item">
          <span class="cmd-voice">"${v}"</span>
          <span class="cmd-action">→ ${a}</span>
        </li>
      `).join('')}
    </ul>
    <button class="ask-btn" onclick="sendPrompt('${m.ask}')">Ask: ${m.ask} ↗</button>
  `;
}

function setActive(i) { active = i; render(); }
render();
</script>
